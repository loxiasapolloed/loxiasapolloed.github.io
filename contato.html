<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato & Comentários - Loxias Apollo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --preto: #000000;
            --amarelo: #FFD700;
            --branco: #FFFFFF;
            --verde-terroso: #5A6B4F;
            --marrom-claro: #A68A64;
            --cinza-claro: #f5f5f5;
            --cinza-medio: #e0e0e0;
            --verde-suave: rgba(90, 107, 79, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'League Spartan', sans-serif;
            background: var(--branco);
            color: var(--preto);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            border-bottom: 2px solid var(--amarelo);
        }

        h1 {
            color: var(--preto);
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--verde-terroso);
            font-size: 1.2rem;
        }

        /* Formulário */
        .comment-form {
            background: var(--cinza-claro);
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 40px;
            border: 1px solid var(--cinza-medio);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--preto);
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--cinza-medio);
            border-radius: 5px;
            font-family: 'League Spartan', sans-serif;
            font-size: 1rem;
        }

        textarea {
            min-height: 150px;
            resize: vertical;
        }

        .hashtags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .hashtag-btn {
            background: var(--verde-suave);
            border: 1px solid var(--verde-terroso);
            color: var(--verde-terroso);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .hashtag-btn:hover {
            background: var(--verde-terroso);
            color: white;
        }

        .hashtag-btn.active {
            background: var(--verde-terroso);
            color: white;
        }

        .submit-btn {
            background: var(--preto);
            color: var(--amarelo);
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background: #333;
        }

        .submit-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }

        /* Comentários */
        .comments-section {
            margin-top: 40px;
        }

        .comments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--cinza-medio);
        }

        .refresh-btn {
            background: var(--verde-terroso);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .comment {
            background: white;
            border: 1px solid var(--cinza-medio);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .comment-author {
            font-weight: 600;
            color: var(--verde-terroso);
        }

        .comment-date {
            color: var(--marrom-claro);
            font-size: 0.9rem;
        }

        .comment-tag {
            background: var(--amarelo);
            color: var(--preto);
            padding: 3px 10px;
            border-radius: 3px;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        .comment-body {
            margin-bottom: 15px;
            white-space: pre-wrap;
        }

        .comment-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid var(--cinza-claro);
            font-size: 0.9rem;
            color: var(--marrom-claro);
        }

        .comment-link {
            color: var(--verde-terroso);
            text-decoration: none;
        }

        .comment-link:hover {
            text-decoration: underline;
        }

        /* Estados */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--marrom-claro);
        }

        .error {
            background: #ffe6e6;
            border: 1px solid #ff9999;
            color: #cc0000;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .success {
            background: #e6ffe6;
            border: 1px solid #99ff99;
            color: #009900;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--marrom-claro);
            background: var(--cinza-claro);
            border-radius: 8px;
            border: 2px dashed var(--cinza-medio);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💬 Canal Direto com a Loxias Apollo</h1>
            <p class="subtitle">Compartilhe suas ideias, dúvidas e sugestões</p>
        </header>

        <!-- Mensagens de Status -->
        <div id="message" style="display: none;"></div>

        <!-- Formulário de Comentário -->
        <div class="comment-form">
            <div class="form-group">
                <label for="author">Seu nome *</label>
                <input type="text" id="author" placeholder="Como gostaria de ser chamado?" required>
            </div>

            <div class="form-group">
                <label for="comment">Seu comentário *</label>
                <textarea id="comment" placeholder="Compartilhe sua ideia, dúvida ou sugestão..." required></textarea>
            </div>

            <div class="form-group">
                <label>Escolha uma categoria:</label>
                <div class="hashtags">
                    <button type="button" class="hashtag-btn" data-tag="#leitor">📖 Leitor</button>
                    <button type="button" class="hashtag-btn" data-tag="#escritor">✍️ Escritor</button>
                    <button type="button" class="hashtag-btn" data-tag="#sugestão">💡 Sugestão</button>
                    <button type="button" class="hashtag-btn" data-tag="#dúvida">❓ Dúvida</button>
                    <button type="button" class="hashtag-btn" data-tag="#elogio">🌟 Elogio</button>
                </div>
                <input type="hidden" id="selectedTag" value="#leitor">
            </div>

            <button class="submit-btn" id="submitBtn">
                <i class="fas fa-paper-plane"></i>
                <span>Enviar Comentário</span>
            </button>

            <p style="margin-top: 15px; font-size: 0.9rem; color: var(--marrom-claro); text-align: center;">
                Seu comentário será publicado como uma issue no GitHub. Todos podem ver e a equipe responderá.
            </p>
        </div>

        <!-- Lista de Comentários -->
        <div class="comments-section">
            <div class="comments-header">
                <h2>📝 Comentários da Comunidade</h2>
                <button class="refresh-btn" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i>
                    Atualizar
                </button>
            </div>

            <div id="commentsContainer">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Carregando comentários...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==============================================
        // SISTEMA DE COMENTÁRIOS SEGURO
        // ==============================================
        
        // Configurações públicas (podem ficar no código)
        const GITHUB_CONFIG = {
            USERNAME: 'loxiasapolloed',
            REPO: 'loxias-comentarios',
            LABEL: 'comentario-site'
        };
        
        // Sistema principal
        const CommentSystem = {
            token: null,
            
            // Inicializar
            init() {
                this.loadToken();
                this.setupUI();
                this.setupEvents();
                this.checkConfiguration();
                this.loadComments();
            },
            
            // Carregar token do localStorage
            loadToken() {
                this.token = localStorage.getItem('loxias_github_token');
            },
            
            // Configurar interface
            setupUI() {
                // Adicionar seção de configuração se não existir
                if (!document.getElementById('tokenConfig')) {
                    const configHTML = `
                        <div class="config-section" id="tokenConfig" style="
                            background: #f8f9fa;
                            border: 2px dashed #5A6B4F;
                            border-radius: 8px;
                            padding: 20px;
                            margin-bottom: 30px;
                        ">
                            <h3 style="color: #5A6B4F; margin-bottom: 15px;">
                                <i class="fas fa-cog"></i> Configuração do Sistema
                            </h3>
                            
                            <div style="background: white; padding: 15px; border-radius: 5px; margin-bottom: 15px; border-left: 4px solid #FFD700;">
                                <p><strong>Como configurar:</strong></p>
                                <ol style="margin-left: 20px; margin-top: 10px;">
                                    <li>Acesse <a href="https://github.com/settings/tokens" target="_blank">GitHub Tokens</a></li>
                                    <li>Gere um novo token com permissão <code>public_repo</code></li>
                                    <li>Cole abaixo (apenas no seu navegador)</li>
                                </ol>
                            </div>
                            
                            <div style="margin-bottom: 15px;">
                                <label style="display: block; margin-bottom: 5px; font-weight: 600;">
                                    Token do GitHub:
                                </label>
                                <input type="password" id="tokenInput" 
                                       placeholder="ghp_..." 
                                       style="width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 5px;"
                                       value="${this.token || ''}">
                            </div>
                            
                            <div style="display: flex; gap: 10px;">
                                <button id="saveTokenBtn" style="
                                    background: #5A6B4F; 
                                    color: white; 
                                    border: none; 
                                    padding: 10px 20px; 
                                    border-radius: 5px; 
                                    cursor: pointer;
                                    font-family: 'League Spartan', sans-serif;
                                ">
                                    <i class="fas fa-save"></i> Salvar Token
                                </button>
                                
                                <button id="clearTokenBtn" style="
                                    background: #666; 
                                    color: white; 
                                    border: none; 
                                    padding: 10px 20px; 
                                    border-radius: 5px; 
                                    cursor: pointer;
                                    font-family: 'League Spartan', sans-serif;
                                ">
                                    <i class="fas fa-trash"></i> Limpar
                                </button>
                            </div>
                            
                            <p style="margin-top: 10px; font-size: 0.8rem; color: #666;">
                                <i class="fas fa-info-circle"></i> Esta configuração fica apenas no seu navegador.
                            </p>
                        </div>
                    `;
                    
                    // Inserir após o header
                    const header = document.querySelector('header');
                    header.insertAdjacentHTML('afterend', configHTML);
                    
                    // Configurar eventos dos botões
                    document.getElementById('saveTokenBtn').addEventListener('click', () => this.saveToken());
                    document.getElementById('clearTokenBtn').addEventListener('click', () => this.clearToken());
                }
            },
            
            // Configurar eventos
            setupEvents() {
                // Hashtags
                const buttons = document.querySelectorAll('.hashtag-btn');
                buttons.forEach(btn => {
                    btn.addEventListener('click', () => {
                        buttons.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        document.getElementById('selectedTag').value = btn.dataset.tag;
                    });
                });
                buttons[0].classList.add('active');
                
                // Botões principais
                document.getElementById('submitBtn').addEventListener('click', () => this.submitComment());
                document.getElementById('refreshBtn').addEventListener('click', () => this.loadComments());
                
                // Enter para enviar
                document.getElementById('comment').addEventListener('keydown', (e) => {
                    if (e.ctrlKey && e.key === 'Enter') {
                        this.submitComment();
                    }
                });
            },
            
            // Verificar configuração
            checkConfiguration() {
                if (!this.token) {
                    this.showMessage('⚠️ Configure o token do GitHub para enviar comentários.', 'error');
                }
            },
            
            // Salvar token
            saveToken() {
                const tokenInput = document.getElementById('tokenInput');
                const token = tokenInput.value.trim();
                
                if (!token) {
                    this.showMessage('Por favor, insira um token.', 'error');
                    return;
                }
                
                if (!token.startsWith('ghp_') && !token.startsWith('github_pat_')) {
                    this.showMessage('Token inválido. Deve começar com "ghp_" ou "github_pat_"', 'error');
                    return;
                }
                
                localStorage.setItem('loxias_github_token', token);
                this.token = token;
                this.showMessage('✅ Token salvo com sucesso!', 'success');
            },
            
            // Limpar token
            clearToken() {
                localStorage.removeItem('loxias_github_token');
                this.token = null;
                document.getElementById('tokenInput').value = '';
                this.showMessage('Token removido.', 'success');
            },
            
            // Mostrar mensagem
            showMessage(text, type = 'success') {
                let messageDiv = document.getElementById('message');
                
                // Criar se não existir
                if (!messageDiv) {
                    messageDiv = document.createElement('div');
                    messageDiv.id = 'message';
                    messageDiv.style.cssText = 'display: none; margin-bottom: 20px;';
                    document.querySelector('.comment-form').insertAdjacentElement('beforebegin', messageDiv);
                }
                
                // Estilos
                const styles = {
                    success: 'background: #e6ffe6; border: 1px solid #99ff99; color: #009900;',
                    error: 'background: #ffe6e6; border: 1px solid #ff9999; color: #cc0000;'
                };
                
                messageDiv.innerHTML = `
                    <div style="padding: 15px; border-radius: 5px; ${styles[type]}">
                        <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-triangle'}"></i>
                        ${text}
                    </div>
                `;
                messageDiv.style.display = 'block';
                
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, type === 'error' ? 5000 : 3000);
            },
            
            // Enviar comentário
            async submitComment() {
                const author = document.getElementById('author').value.trim();
                const comment = document.getElementById('comment').value.trim();
                const tag = document.getElementById('selectedTag').value;
                
                if (!author || !comment) {
                    this.showMessage('Por favor, preencha seu nome e comentário.', 'error');
                    return;
                }
                
                if (!this.token) {
                    this.showMessage('⚠️ Configure o token do GitHub primeiro.', 'error');
                    return;
                }
                
                const submitBtn = document.getElementById('submitBtn');
                const originalText = submitBtn.innerHTML;
                
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
                submitBtn.disabled = true;
                
                try {
                    const issueData = {
                        title: `${tag} - ${author}`,
                        body: `**Autor:** ${author}\n\n**Comentário:**\n${comment}\n\n---\n*Enviado através do site Loxias Apollo*`,
                        labels: [GITHUB_CONFIG.LABEL, tag.replace('#', '')]
                    };
                    
                    const response = await fetch(
                        `https://api.github.com/repos/${GITHUB_CONFIG.USERNAME}/${GITHUB_CONFIG.REPO}/issues`,
                        {
                            method: 'POST',
                            headers: {
                                'Authorization': `token ${this.token}`,
                                'Content-Type': 'application/json',
                                'Accept': 'application/vnd.github.v3+json'
                            },
                            body: JSON.stringify(issueData)
                        }
                    );
                    
                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(`Erro ${response.status}: ${errorText}`);
                    }
                    
                    // Limpar formulário
                    document.getElementById('author').value = '';
                    document.getElementById('comment').value = '';
                    
                    this.showMessage('✅ Comentário enviado com sucesso! Aparecerá em breve.');
                    
                    // Atualizar lista
                    setTimeout(() => this.loadComments(), 2000);
                    
                } catch (error) {
                    console.error('Erro:', error);
                    this.showMessage(`❌ Erro ao enviar: ${error.message}`, 'error');
                    
                    // Token pode ter expirado
                    if (error.message.includes('401') || error.message.includes('Bad credentials')) {
                        this.showMessage('Token inválido ou expirado. Gere um novo.', 'error');
                        this.clearToken();
                    }
                } finally {
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            },
            
            // Carregar comentários
            async loadComments() {
                const container = document.getElementById('commentsContainer');
                container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Carregando comentários...</p></div>';
                
                try {
                    const response = await fetch(
                        `https://api.github.com/repos/${GITHUB_CONFIG.USERNAME}/${GITHUB_CONFIG.REPO}/issues?labels=${GITHUB_CONFIG.LABEL}&state=all&sort=created&direction=desc`,
                        {
                            headers: {
                                'Accept': 'application/vnd.github.v3+json'
                            }
                        }
                    );
                    
                    if (!response.ok) {
                        throw new Error(`Erro ${response.status}`);
                    }
                    
                    const issues = await response.json();
                    
                    if (issues.length === 0) {
                        container.innerHTML = `
                            <div class="empty-state">
                                <i class="far fa-comment-dots fa-2x"></i>
                                <h3>Nenhum comentário ainda</h3>
                                <p>Seja o primeiro a compartilhar sua opinião!</p>
                            </div>
                        `;
                        return;
                    }
                    
                    let html = '';
                    
                    issues.forEach(issue => {
                        let author = 'Anônimo';
                        let tag = '#comentário';
                        let comment = issue.body || '';
                        
                        const authorMatch = comment.match(/\*\*Autor:\*\*\s*(.+)/);
                        if (authorMatch) author = authorMatch[1];
                        
                        const commentMatch = comment.match(/\*\*Comentário:\*\*\s*([\s\S]+?)\n\n---/);
                        if (commentMatch) comment = commentMatch[1].trim();
                        
                        const tags = issue.labels.map(label => label.name);
                        const possibleTags = ['leitor', 'escritor', 'sugestão', 'dúvida', 'elogio'];
                        const foundTag = tags.find(t => possibleTags.includes(t));
                        if (foundTag) tag = `#${foundTag}`;
                        
                        const date = new Date(issue.created_at);
                        const dateStr = date.toLocaleDateString('pt-BR', {
                            day: '2-digit',
                            month: '2-digit',
                            year: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        });
                        
                        html += `
                            <div class="comment">
                                <div class="comment-header">
                                    <div>
                                        <span class="comment-author">${this.escapeHtml(author)}</span>
                                        <span class="comment-tag">${this.escapeHtml(tag)}</span>
                                    </div>
                                    <span class="comment-date">${dateStr}</span>
                                </div>
                                <div class="comment-body">${this.escapeHtml(comment)}</div>
                                <div class="comment-footer">
                                    <div>
                                        ${issue.state === 'open' ? 
                                            '<span style="color: green;">● Aberto</span>' : 
                                            '<span style="color: #666;">● Fechado</span>'}
                                    </div>
                                    <a href="${issue.html_url}" target="_blank" class="comment-link">
                                        <i class="fab fa-github"></i> Ver no GitHub
                                    </a>
                                </div>
                            </div>
                        `;
                    });
                    
                    container.innerHTML = html;
                    
                } catch (error) {
                    console.error('Erro ao carregar:', error);
                    container.innerHTML = `
                        <div class="error">
                            <i class="fas fa-exclamation-triangle"></i>
                            <p>Não foi possível carregar os comentários. Tente novamente.</p>
                        </div>
                    `;
                }
            },
            
            // Escape HTML
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        };
        
        // ==============================================
        // INICIALIZAR QUANDO A PÁGINA CARREGAR
        // ==============================================
        document.addEventListener('DOMContentLoaded', () => {
            CommentSystem.init();
        });
    </script>
</body>
</html>
