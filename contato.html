<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato & Comentários - Loxias Apollo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --preto: #000000;
            --amarelo: #FFD700;
            --branco: #FFFFFF;
            --verde-terroso: #5A6B4F;
            --marrom-claro: #A68A64;
            --cinza-claro: #f5f5f5;
            --cinza-medio: #e0e0e0;
            --verde-suave: rgba(90, 107, 79, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'League Spartan', sans-serif;
            background: var(--branco);
            color: var(--preto);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            border-bottom: 2px solid var(--amarelo);
        }

        h1 {
            color: var(--preto);
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--verde-terroso);
            font-size: 1.2rem;
        }

        /* Formulário */
        .comment-form {
            background: var(--cinza-claro);
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 40px;
            border: 1px solid var(--cinza-medio);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--preto);
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--cinza-medio);
            border-radius: 5px;
            font-family: 'League Spartan', sans-serif;
            font-size: 1rem;
        }

        textarea {
            min-height: 150px;
            resize: vertical;
        }

        .hashtags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .hashtag-btn {
            background: var(--verde-suave);
            border: 1px solid var(--verde-terroso);
            color: var(--verde-terroso);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .hashtag-btn:hover {
            background: var(--verde-terroso);
            color: white;
        }

        .hashtag-btn.active {
            background: var(--verde-terroso);
            color: white;
        }

        .submit-btn {
            background: var(--preto);
            color: var(--amarelo);
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background: #333;
        }

        .submit-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }

        /* Comentários */
        .comments-section {
            margin-top: 40px;
        }

        .comments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--cinza-medio);
        }

        .refresh-btn {
            background: var(--verde-terroso);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .comment {
            background: white;
            border: 1px solid var(--cinza-medio);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .comment-author {
            font-weight: 600;
            color: var(--verde-terroso);
        }

        .comment-date {
            color: var(--marrom-claro);
            font-size: 0.9rem;
        }

        .comment-tag {
            background: var(--amarelo);
            color: var(--preto);
            padding: 3px 10px;
            border-radius: 3px;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        .comment-body {
            margin-bottom: 15px;
            white-space: pre-wrap;
        }

        .comment-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid var(--cinza-claro);
            font-size: 0.9rem;
            color: var(--marrom-claro);
        }

        .comment-link {
            color: var(--verde-terroso);
            text-decoration: none;
        }

        .comment-link:hover {
            text-decoration: underline;
        }

        /* Estados */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--marrom-claro);
        }

        .error {
            background: #ffe6e6;
            border: 1px solid #ff9999;
            color: #cc0000;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .success {
            background: #e6ffe6;
            border: 1px solid #99ff99;
            color: #009900;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--marrom-claro);
            background: var(--cinza-claro);
            border-radius: 8px;
            border: 2px dashed var(--cinza-medio);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💬 Canal Direto com a Loxias Apollo</h1>
            <p class="subtitle">Compartilhe suas ideias, dúvidas e sugestões</p>
        </header>

        <!-- Mensagens de Status -->
        <div id="message" style="display: none;"></div>

        <!-- Formulário de Comentário -->
        <div class="comment-form">
            <div class="form-group">
                <label for="author">Seu nome *</label>
                <input type="text" id="author" placeholder="Como gostaria de ser chamado?" required>
            </div>

            <div class="form-group">
                <label for="comment">Seu comentário *</label>
                <textarea id="comment" placeholder="Compartilhe sua ideia, dúvida ou sugestão..." required></textarea>
            </div>

            <div class="form-group">
                <label>Escolha uma categoria:</label>
                <div class="hashtags">
                    <button type="button" class="hashtag-btn" data-tag="#leitor">📖 Leitor</button>
                    <button type="button" class="hashtag-btn" data-tag="#escritor">✍️ Escritor</button>
                    <button type="button" class="hashtag-btn" data-tag="#sugestão">💡 Sugestão</button>
                    <button type="button" class="hashtag-btn" data-tag="#dúvida">❓ Dúvida</button>
                    <button type="button" class="hashtag-btn" data-tag="#elogio">🌟 Elogio</button>
                </div>
                <input type="hidden" id="selectedTag" value="#leitor">
            </div>

            <button class="submit-btn" id="submitBtn">
                <i class="fas fa-paper-plane"></i>
                <span>Enviar Comentário</span>
            </button>

            <p style="margin-top: 15px; font-size: 0.9rem; color: var(--marrom-claro); text-align: center;">
                Seu comentário será publicado como uma issue no GitHub. Todos podem ver e a equipe responderá.
            </p>
        </div>

        <!-- Lista de Comentários -->
        <div class="comments-section">
            <div class="comments-header">
                <h2>📝 Comentários da Comunidade</h2>
                <button class="refresh-btn" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i>
                    Atualizar
                </button>
            </div>

            <div id="commentsContainer">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Carregando comentários...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==============================================
        // CONFIGURAÇÃO - ALTERE AQUI!
        // ==============================================
        const CONFIG = {
            // SEU nome de usuário do GitHub
            GITHUB_USERNAME: 'loxiasapolloed',
            
            // Nome do repositório onde os comentários vão ser issues
            REPO_NAME: 'loxias-comentarios',
            
            // Seu token pessoal do GitHub (NÃO COMPARTILHE!)
            // Você vai colocar isso manualmente após gerar
            GITHUB_TOKEN: 'SEU_TOKEN_AQUI', // ← COLE O TOKEN AQUI
            
            // Rótulo para identificar issues deste site
            ISSUE_LABEL: 'comentario-site'
        };

        // ==============================================
        // FUNÇÕES PRINCIPAIS
        // ==============================================

        // 1. MOSTRAR MENSAGEM
        function showMessage(text, type = 'success') {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = text;
            messageDiv.className = type;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, type === 'error' ? 5000 : 3000);
        }

        // 2. CONFIGURAR HASHTAGS
        function setupHashtags() {
            const buttons = document.querySelectorAll('.hashtag-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('selectedTag').value = btn.dataset.tag;
                });
            });
            
            // Primeiro botão ativo por padrão
            buttons[0].classList.add('active');
        }

        // 3. ENVIAR COMENTÁRIO PARA O GITHUB
        async function submitComment() {
            const author = document.getElementById('author').value.trim();
            const comment = document.getElementById('comment').value.trim();
            const tag = document.getElementById('selectedTag').value;
            
            if (!author || !comment) {
                showMessage('Por favor, preencha seu nome e comentário.', 'error');
                return;
            }
            
            if (CONFIG.GITHUB_TOKEN === 'SEU_TOKEN_AQUI') {
                showMessage('⚠️ Sistema não configurado. Configure o token do GitHub primeiro.', 'error');
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
            submitBtn.disabled = true;
            
            try {
                // Criar issue no GitHub
                const issueData = {
                    title: `${tag} - ${author}`,
                    body: `**Autor:** ${author}\n\n**Comentário:**\n${comment}\n\n---\n*Enviado através do site Loxias Apollo*`,
                    labels: [CONFIG.ISSUE_LABEL, tag.replace('#', '')]
                };
                
                const response = await fetch(
                    `https://api.github.com/repos/${CONFIG.GITHUB_USERNAME}/${CONFIG.REPO_NAME}/issues`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `token ${CONFIG.GITHUB_TOKEN}`,
                            'Content-Type': 'application/json',
                            'Accept': 'application/vnd.github.v3+json'
                        },
                        body: JSON.stringify(issueData)
                    }
                );
                
                if (!response.ok) {
                    throw new Error(`Erro ${response.status}: ${response.statusText}`);
                }
                
                const issue = await response.json();
                
                // Limpar formulário
                document.getElementById('author').value = '';
                document.getElementById('comment').value = '';
                
                showMessage('✅ Comentário enviado com sucesso! Aparecerá em breve.');
                
                // Atualizar lista após 2 segundos
                setTimeout(loadComments, 2000);
                
            } catch (error) {
                console.error('Erro ao enviar comentário:', error);
                showMessage(`❌ Erro: ${error.message}`, 'error');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        }

        // 4. CARREGAR COMENTÁRIOS DO GITHUB
        async function loadComments() {
            const container = document.getElementById('commentsContainer');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Carregando comentários...</p></div>';
            
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${CONFIG.GITHUB_USERNAME}/${CONFIG.REPO_NAME}/issues?labels=${CONFIG.ISSUE_LABEL}&state=all&sort=created&direction=desc`,
                    {
                        headers: {
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );
                
                if (!response.ok) {
                    throw new Error(`Erro ${response.status}`);
                }
                
                const issues = await response.json();
                
                if (issues.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="far fa-comment-dots fa-2x"></i>
                            <h3>Nenhum comentário ainda</h3>
                            <p>Seja o primeiro a compartilhar sua opinião!</p>
                        </div>
                    `;
                    return;
                }
                
                // Renderizar comentários
                let html = '';
                
                issues.forEach(issue => {
                    // Extrair autor do título ou do corpo
                    let author = 'Anônimo';
                    let tag = '#comentário';
                    let comment = issue.body || '';
                    
                    // Extrair informações do corpo
                    const authorMatch = comment.match(/\*\*Autor:\*\*\s*(.+)/);
                    if (authorMatch) author = authorMatch[1];
                    
                    const commentMatch = comment.match(/\*\*Comentário:\*\*\s*([\s\S]+?)\n\n---/);
                    if (commentMatch) comment = commentMatch[1].trim();
                    
                    // Verificar tags
                    const tags = issue.labels.map(label => label.name);
                    const possibleTags = ['leitor', 'escritor', 'sugestão', 'dúvida', 'elogio'];
                    const foundTag = tags.find(t => possibleTags.includes(t));
                    if (foundTag) tag = `#${foundTag}`;
                    
                    // Formatar data
                    const date = new Date(issue.created_at);
                    const dateStr = date.toLocaleDateString('pt-BR', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    
                    html += `
                        <div class="comment">
                            <div class="comment-header">
                                <div>
                                    <span class="comment-author">${escapeHtml(author)}</span>
                                    <span class="comment-tag">${escapeHtml(tag)}</span>
                                </div>
                                <span class="comment-date">${dateStr}</span>
                            </div>
                            <div class="comment-body">${escapeHtml(comment)}</div>
                            <div class="comment-footer">
                                <div>
                                    ${issue.state === 'open' ? 
                                        '<span style="color: green;">● Aberto</span>' : 
                                        '<span style="color: #666;">● Fechado</span>'}
                                </div>
                                <a href="${issue.html_url}" target="_blank" class="comment-link">
                                    <i class="fab fa-github"></i> Ver no GitHub
                                </a>
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Erro ao carregar comentários:', error);
                container.innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Não foi possível carregar os comentários. Tente novamente.</p>
                    </div>
                `;
            }
        }

        // 5. ESCAPE HTML (segurança)
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==============================================
        // INICIALIZAÇÃO
        // ==============================================
        document.addEventListener('DOMContentLoaded', () => {
            // Configurar eventos
            setupHashtags();
            
            document.getElementById('submitBtn').addEventListener('click', submitComment);
            document.getElementById('refreshBtn').addEventListener('click', loadComments);
            
            // Permitir Enter para enviar
            document.getElementById('comment').addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'Enter') {
                    submitComment();
                }
            });
            
            // Carregar comentários iniciais
            loadComments();
            
            // Verificar se token está configurado
            if (CONFIG.GITHUB_TOKEN === 'SEU_TOKEN_AQUI') {
                showMessage(
                    '⚠️ Configure o sistema: gere um token em github.com/settings/tokens e cole na linha 185 do código.',
                    'error'
                );
            }
        });
    </script>
</body>
</html>
