<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Obrigado • Loxias Apollo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --preto: #000000;
      --amarelo: #FFD700;
      --branco: #FFFFFF;
      --verde-terroso: #5A6B4F;
      --marrom-claro: #A68A64;
      --cinza-claro: #f5f5f5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
/* ===== FUNDO ANIMADO (GIF) ===== */
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: 
    url('obrigado-bg.webp') center/cover no-repeat fixed,
    var(--branco);
  color: var(--preto);
  font-family: 'League Spartan', sans-serif;
  font-weight: 200;
  line-height: 1.6;
}

/* ===== SOBREPOR CONTEÚDO AO FUNDO ===== */
.overlay {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ===== CABEÇALHO & NAVEGAÇÃO ===== */
.header-with-logo,
nav {
  position: relative;
  z-index: 2;
}

/* ===== CONTEÚDO PRINCIPAL ===== */
main {
  padding: 3rem 5% 4rem;
  max-width: 800px;
  margin: 0 auto;
  background-color: rgba(255, 255, 255, 0.92);
  border-radius: 4px;
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
  text-align: center;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* ===== RODAPÉ (AGORA SEMPRE NO FINAL) ===== */
footer {
  margin-top: auto;
  padding: 2rem 5%;
  text-align: center;
  background-color: var(--preto);
  color: var(--branco);
  font-size: 0.95rem;
}
    /* ===== RESPONSIVIDADE ===== */
    @media (max-width: 768px) {
      .logo-container {
        flex-direction: column;
        text-align: center;
      }
      
      .site-title-container {
        border-left: none;
        padding-left: 0;
        border-top: 2px solid var(--amarelo);
        padding-top: 1rem;
        margin-top: 1rem;
        text-align: center;
      }
      
      .site-title {
        font-size: 2rem;
      }
      
      nav a {
        display: block;
        margin: 0.7rem 0;
        font-size: 1.1rem;
      }
      
      .links {
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      
      .links a {
        width: 100%;
        max-width: 250px;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <!-- CABEÇALHO COM LOGO -->
  <header class="header-with-logo">
    <div class="logo-container">
      <img src="logo.png" 
           alt="Logo Loxias Apollo" 
           class="site-logo">
      
      <div class="site-title-container">
        <h1 class="site-title">LOXIAS APOLLO</h1>
        <p class="site-subtitle">Editora Independente de Literatura Local e Mundial</p>
      </div>
    </div>
  </header>

  <!-- NAVEGAÇÃO -->
  <nav>
    <a href="index.html">Início</a>
    <a href="sobre.html">Sobre</a>
    <a href="livros.html">Livros</a>
    <a href="blog.html">Blog</a>
    <a href="contato.html">Contato</a>
  </nav>
  
  <!-- CONTEÚDO PRINCIPAL -->
  <main class="overlay">
    <p class="mensagem-obrigado">
      Sua mensagem foi enviada com sucesso.<br>
      <strong>Agradecemos por entrar em contato com a Loxias Apollo.</strong>
    </p>

    <div class="links">
      <a href="index.html">Voltar ao início</a>
      <a href="livros.html">Conhecer nossos livros</a>
    </div>
  </main>

  <!-- RODAPÉ -->
  <footer>
    <p>© 2026 Loxias Apollo. Todos os direitos reservados.</p>
  </footer>
</body>
</html>
